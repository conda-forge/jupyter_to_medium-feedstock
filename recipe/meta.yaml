{% set name = "jupyter_to_medium" %}
{% set version = "0.2.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 9a763ead5466974e04323246a3d9a299d73484a2365aa5feb279332d581a7fca

build:
  number: 1
  noarch: python
  entry_points:
    - jupyter_to_medium=jupyter_to_medium._command_line:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - beautifulsoup4
    - matplotlib-base >=3.1
    - nbconvert
    - numpy
    - python >={{ python_min }}
    - requests

test:
  imports:
    - jupyter_to_medium
  commands:
    - pip check
    - jupyter_to_medium --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://dexplo.org/jupyter_to_medium
  summary: Publish a Jupyter Notebook as a Medium blogpost
  license: MIT
  license_file: LICENSE
  doc_url: https://dexplo.org/jupyter_to_medium
  dev_url: https://github.com/dexplo/jupyter_to_medium

extra:
  recipe-maintainers:
    - tdpetrou
